name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (avoids piling up on rapid pushes /
# on a branch that also has an open PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate maps
        run: node --input-type=module -e "import { MAP_DEFS, validateMap } from './src/systems/Maps.js'; let bad=0; for (const d of MAP_DEFS){const p=validateMap(d); if(p.length){bad++; console.error(d.name, p);}} if(bad) process.exit(1); console.log(MAP_DEFS.length + ' maps OK');"

      - name: Build (production bundle)
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        run: npm test
